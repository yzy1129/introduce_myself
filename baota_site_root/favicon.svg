<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="beam" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.1" />
      <stop offset="34%" stop-color="#7bd3ff" stop-opacity="0.95" />
      <stop offset="64%" stop-color="#c98cff" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#6ee7ff" stop-opacity="0.12" />
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9e8" />
      <stop offset="32%" stop-color="#f1b5ff" />
      <stop offset="62%" stop-color="#6ecfff" />
      <stop offset="100%" stop-color="#0a0f1d" stop-opacity="0" />
