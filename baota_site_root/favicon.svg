    <polygon points="32,10.5 46.5,18.4 46.5,35.6 32,43.5 17.5,35.6 17.5,18.4" />
    <polygon points="32,16.2 41.5,21.5 41.5,32.5 32,37.8 22.5,32.5 22.5,21.5" />
